services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apex
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  receiver:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/apex?sslmode=disable
      - APEX_API_KEY=apex-prod-key-12345
    depends_on:
      - postgres

volumes:
  postgres_data:
