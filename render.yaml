services:
  - type: web
    name: apex-backend
    runtime: go
    plan: free
    buildCommand: go build -o receiver ./cmd/server/main.go
    startCommand: ./receiver
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: apex-cache
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: APEX_API_KEY
        sync: false
      - key: PORT
        value: 8081

databases:
  - name: apex-db
    plan: free

redis:
  - name: apex-cache
    plan: free
    ipAllowList: [] # Only allow internal connections
