syntax = "proto3";

package apex;

option go_package = "github.com/apex/monitor/proto";

// DeviceContext captures the state of the machine at the time of the crash.
message DeviceContext {
    string os = 1;
    string arch = 2;
    int64 total_memory = 3;
    int64 free_memory = 4;
    float battery_level = 5;
    bool is_charging = 6;
    string network_type = 7; // e.g., "wifi", "cellular", "none"
}

// CrashReport is the "DNA" of the error.
message CrashReport {
  string error_id = 1;
  string message = 2;
  string stack_trace = 3;
  int64 timestamp = 4;
  map<string, string> context = 5;
  string ai_insight = 6;
  string org_id = 7;      // Multi-tenant identifier
  string project_id = 8;  // Specific application identifier
}

// BatchReport allows us to squeeze multiple errors into one sync.
message BatchReport {
  repeated CrashReport reports = 1;
  string org_id = 2;      // Batch-level multi-tenant identifier
}
